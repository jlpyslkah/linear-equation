<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일차방정식 마스터</title>
<style>
  :root {
    --board-green: #1a4d2e;
    --board-light: #2d6a4f;
    --chalk-white: #f0ece0;
    --chalk-yellow: #fbbf24;
    --chalk-blue: #93c5fd;
    --bg-dark: #0f1e14;
    --btn-green: #2d6a4f;
    --btn-hover: #3d8b62;
    --correct: #4ade80;
    --wrong: #f87171;
    --gold: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg-dark);
    color: var(--chalk-white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  /* ── 헤더 ── */
  #header {
    background: linear-gradient(135deg, #14532d, #166534);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #4ade80;
    flex-shrink: 0;
  }
  #header h1 { font-size: 1.2rem; color: var(--chalk-yellow); letter-spacing: 2px; }
  #stage-indicator {
    font-size: 0.9rem;
    background: rgba(255,255,255,0.1);
    padding: 4px 14px;
    border-radius: 20px;
    color: var(--chalk-blue);
  }
  #streak-bar {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .streak-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    transition: all 0.3s;
  }
  .streak-dot.active { background: var(--correct); border-color: var(--correct); box-shadow: 0 0 6px var(--correct); }

  /* ── 메인 컨테이너 ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── 상단 2/5: 개념 칠판 ── */
  #concept-board {
    flex: 2;
    min-height: 220px;
    background: var(--board-green);
    border-bottom: 3px solid #4ade80;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
  }
  #concept-board::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(255,255,255,0.03) 28px, rgba(255,255,255,0.03) 29px);
    pointer-events: none;
  }

  #concept-title {
    font-size: 1rem;
    color: var(--chalk-yellow);
    margin-bottom: 10px;
    opacity: 0.85;
    letter-spacing: 1px;
  }

  #concept-content {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .concept-line {
    font-size: 1.1rem;
    color: var(--chalk-white);
    opacity: 0;
    transform: translateX(-10px);
    transition: opacity 0.4s, transform 0.4s;
    line-height: 1.6;
  }
  .concept-line.visible { opacity: 1; transform: translateX(0); }
  .concept-line .highlight { color: var(--chalk-yellow); font-weight: bold; }
  .concept-line .highlight-blue { color: var(--chalk-blue); font-weight: bold; }
  .concept-line .highlight-green { color: var(--correct); font-weight: bold; }

  /* ── 하단 3/5: 문제 영역 ── */
  #problem-area {
    flex: 3;
    display: flex;
    flex-direction: column;
    padding: 12px 20px;
    gap: 10px;
  }

  /* Stage 1: 번호 선택 */
  #s1-choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    flex: 1;
  }
  .choice-btn {
    background: var(--btn-green);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    color: var(--chalk-white);
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    line-height: 1.5;
  }
  .choice-btn:hover { background: var(--btn-hover); border-color: var(--chalk-yellow); }
  .choice-btn.correct { background: #166534; border-color: var(--correct); color: var(--correct); }
  .choice-btn.wrong { background: #7f1d1d; border-color: var(--wrong); color: var(--wrong); }

  /* Stage 2+: 정수 버튼 */
  #int-buttons {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    padding: 4px;
  }
  .int-btn {
    background: var(--btn-green);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: var(--chalk-white);
    font-size: 1rem;
    font-weight: bold;
    padding: 10px 4px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .int-btn:hover { background: var(--btn-hover); border-color: var(--chalk-yellow); transform: translateY(-2px); }
  .int-btn.correct { background: #166534; border-color: var(--correct); color: var(--correct); animation: pulse 0.3s; }
  .int-btn.wrong { background: #7f1d1d; border-color: var(--wrong); color: var(--wrong); animation: shake 0.3s; }

  /* 문제 표시 */
  #problem-display {
    text-align: center;
    flex-shrink: 0;
  }
  #problem-text {
    font-size: 1.8rem;
    color: var(--chalk-white);
    margin-bottom: 6px;
    letter-spacing: 2px;
  }
  #problem-sub {
    font-size: 1rem;
    color: var(--chalk-blue);
    min-height: 22px;
  }
  #step-hint {
    font-size: 0.95rem;
    color: var(--chalk-yellow);
    margin-top: 4px;
    min-height: 20px;
  }

  /* 두 단계 표시 */
  #two-step-display {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin: 4px 0;
  }
  .step-box {
    text-align: center;
    padding: 8px 16px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.2);
    min-width: 120px;
  }
  .step-box.active { border-color: var(--chalk-yellow); background: rgba(251,191,36,0.1); }
  .step-box.done { border-color: var(--correct); background: rgba(74,222,128,0.1); }
  .step-box label { font-size: 0.75rem; color: var(--chalk-blue); display: block; margin-bottom: 4px; }
  .step-box .step-val { font-size: 1.3rem; color: var(--chalk-white); }
  .step-box.done .step-val { color: var(--correct); }

  /* 피드백 */
  #feedback {
    text-align: center;
    font-size: 1.1rem;
    min-height: 28px;
    font-weight: bold;
    transition: all 0.3s;
  }
  #feedback.correct { color: var(--correct); }
  #feedback.wrong { color: var(--wrong); }

  /* 클리어 오버레이 */
  #clear-overlay {
    display: none;
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.85);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 100;
  }
  #clear-overlay.show { display: flex; }
  #clear-overlay h2 { font-size: 2rem; color: var(--gold); text-shadow: 0 0 20px var(--gold); }
  #clear-overlay p { color: var(--chalk-white); font-size: 1.1rem; text-align: center; }
  .overlay-btn {
    padding: 14px 32px;
    border-radius: 30px;
    border: none;
    font-size: 1.1rem;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.2s;
  }
  .overlay-btn:hover { transform: scale(1.05); }
  .btn-next { background: var(--correct); color: #0f1e14; }
  .btn-retry { background: var(--chalk-yellow); color: #0f1e14; }

  /* 실패 오버레이 */
  #fail-overlay {
    display: none;
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.85);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
  }
  #fail-overlay.show { display: flex; }
  #fail-overlay h2 { font-size: 1.8rem; color: var(--wrong); }
  #fail-overlay p { color: var(--chalk-white); font-size: 1rem; text-align: center; }
  .btn-restart { background: var(--wrong); color: white; }

  /* 완료 오버레이 */
  #complete-overlay {
    display: none;
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.92);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 200;
  }
  #complete-overlay.show { display: flex; }
  #complete-overlay h2 { font-size: 2.2rem; color: var(--gold); text-align: center; }
  #complete-overlay p { color: var(--chalk-white); font-size: 1.1rem; text-align: center; line-height: 1.8; }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
</style>
</head>
<body>

<!-- 헤더 -->
<div id="header">
  <h1>📐 일차방정식 마스터</h1>
  <div id="stage-indicator">Stage 1 / 5</div>
  <div id="streak-bar">
    <span style="font-size:0.8rem;color:var(--chalk-blue);margin-right:4px;">연속정답</span>
    <div class="streak-dot" id="d0"></div>
    <div class="streak-dot" id="d1"></div>
    <div class="streak-dot" id="d2"></div>
    <div class="streak-dot" id="d3"></div>
    <div class="streak-dot" id="d4"></div>
  </div>
</div>

<!-- 메인 -->
<div id="main">

  <!-- 상단 2/5: 개념 칠판 -->
  <div id="concept-board">
    <div id="concept-title">📖 개념 설명</div>
    <div id="concept-content"></div>
  </div>

  <!-- 하단 3/5: 문제 -->
  <div id="problem-area">
    <div id="problem-display">
      <div id="problem-text"></div>
      <div id="problem-sub"></div>
      <div id="step-hint"></div>
    </div>

    <!-- Stage 2~: 두 단계 표시 -->
    <div id="two-step-display" style="display:none;">
      <div class="step-box active" id="step1-box">
        <label id="step1-label">1단계</label>
        <div class="step-val" id="step1-val">?</div>
      </div>
      <div class="step-box" id="step2-box">
        <label>2단계: x = ?</label>
        <div class="step-val" id="step2-val">?</div>
      </div>
    </div>

    <div id="feedback"></div>

    <!-- Stage 1: 보기 4개 -->
    <div id="s1-choices" style="display:none;"></div>

    <!-- Stage 2~: 정수 버튼 -->
    <div id="int-buttons" style="display:none;"></div>
  </div>

  <!-- 클리어 오버레이 -->
  <div id="clear-overlay">
    <h2>🎉 스테이지 클리어!</h2>
    <p id="clear-msg">5개 연속 정답!</p>
    <button class="overlay-btn btn-next" id="btn-next-stage">다음 스테이지 gogo →</button>
    <button class="overlay-btn btn-retry" id="btn-retry-stage">🔄 다시 반복 연습할래!</button>
  </div>

  <!-- 실패 오버레이 -->
  <div id="fail-overlay">
    <h2>😅 틀렸어요!</h2>
    <p id="fail-msg">처음부터 다시 시작!</p>
    <button class="overlay-btn btn-restart" id="btn-restart">다시 시작하기</button>
  </div>

  <!-- 완료 오버레이 -->
  <div id="complete-overlay">
    <h2>🏆 모든 스테이지 완료!</h2>
    <p>일차방정식을 완전히 정복했어요!<br>대단해요! 👏</p>
    <button class="overlay-btn btn-next" onclick="location.reload()">처음부터 다시하기</button>
  </div>

</div>

<script>
// ══════════════════════════════════════════
// 스테이지 데이터
// ══════════════════════════════════════════
const STAGES = [
  // Stage 1: 방정식의 뜻
  {
    id: 1,
    title: '방정식의 뜻',
    type: 'choice',
    concept: [
      { text: '등식이란? <span class="highlight">등호(=)가 있는 식</span>이에요.', delay: 0 },
      { text: '예) <span class="highlight-blue">2 + 3 = 5</span> &nbsp;➜&nbsp; 등식 ✓', delay: 500 },
      { text: '방정식이란? <span class="highlight">미지수 x가 포함된 등식</span>이에요.', delay: 1100 },
      { text: '예) <span class="highlight-yellow">x + 3 = 5</span> &nbsp;➜&nbsp; 방정식 ✓', delay: 1700 },
      { text: '<span class="highlight-green">x가 없는 등식</span>이나 <span class="highlight-green">등호가 없는 식</span>은 방정식이 아니에요.', delay: 2400 },
    ],
    generate() {
      // 4개 보기 중 1개만 방정식, 나머지 3개는 중복 없이 선택
      const correct = Math.floor(Math.random() * 4);
      const equations = ['x + 3 = 7', '2x = 10', 'x - 1 = 5', '3x = 9', 'x + 1 = 4', '5x = 15', 'x - 6 = 2'];
      const nonEq = ['2 + 3 = 5', '4 × 2 = 8', 'x + 3', '2x - 1', '5 + 7', '3 × 4', 'x + 2 > 3', '7 - 2 = 5', '10 - 4 = 6', 'x - 1 > 0'];
      const eq = equations[Math.floor(Math.random() * equations.length)];
      // 중복 없이 3개 뽑기
      const shuffled = nonEq.slice().sort(() => Math.random() - 0.5);
      const picked = shuffled.slice(0, 3);
      const choices = [];
      let nonEqIdx = 0;
      for (let i = 0; i < 4; i++) {
        if (i === correct) choices.push({ text: eq, isCorrect: true });
        else choices.push({ text: picked[nonEqIdx++], isCorrect: false });
      }
      return { question: '다음 중 방정식을 고르세요.', choices, answer: correct };
    }
  },

  // Stage 2: x ± a = b (등식의 성질)
  {
    id: 2,
    title: '등식의 성질 (덧셈/뺄셈)',
    type: 'twostep',
    concept: [
      { text: '등식의 성질: <span class="highlight">양변에 같은 수를 더하거나 빼도 등식 성립!</span>', delay: 0 },
      { text: '예) <span class="highlight-blue">x + 5 = 8</span>', delay: 700 },
      { text: '&nbsp;&nbsp;&nbsp;➜ 양변에서 <span class="highlight">5를 빼면</span>: x + 5 <span class="highlight-green">- 5</span> = 8 <span class="highlight-green">- 5</span>', delay: 1400 },
      { text: '&nbsp;&nbsp;&nbsp;➜ <span class="highlight-yellow">x = 3</span>', delay: 2100 },
    ],
    generate() {
      const type = Math.random() < 0.5 ? 'add' : 'sub';
      let a, x, b, question, step1Label, step1Answer, step2Answer;
      // x≠0 조건 (0이면 문제가 너무 단순)
      do { x = randInt(-10, 10); } while (x === 0);
      if (type === 'add') {
        // x + a = b
        // step1Answer = a (1~9), step2Answer = x (-10~10, ≠0)
        a = randInt(1, 9);
        b = x + a;
        question = `x + ${a} = ${b}`;
        step1Label = `양변에서 빼야 할 수는?`;
        step1Answer = a;
        step2Answer = x;
      } else {
        // x - a = b
        // step1Answer = a (1~9), step2Answer = x (-10~10, ≠0)
        a = randInt(1, 9);
        b = x - a;
        question = `x - ${a} = ${b}`;
        step1Label = `양변에 더해야 할 수는?`;
        step1Answer = a;
        step2Answer = x;
      }
      // 최종 검증: 두 답 모두 -10~10인지 확인
      if (step1Answer < -10 || step1Answer > 10) return this.generate();
      if (step2Answer < -10 || step2Answer > 10) return this.generate();
      return { question, step1Label, step1Answer, step2Answer };
    }
  },

  // Stage 3: ax=b, x/a=b
  {
    id: 3,
    title: '등식의 성질 (곱셈/나눗셈)',
    type: 'twostep',
    concept: [
      { text: '예) <span class="highlight-blue">3x = 6</span>', delay: 0 },
      { text: '&nbsp;&nbsp;&nbsp;➜ 양변을 <span class="highlight">3으로 나누면</span>: 3x <span class="highlight-green">÷ 3</span> = 6 <span class="highlight-green">÷ 3</span>', delay: 700 },
      { text: '&nbsp;&nbsp;&nbsp;➜ <span class="highlight-yellow">x = 2</span>', delay: 1400 },
      { text: '예) <span class="highlight-blue">x ÷ 3 = 2</span>', delay: 2100 },
      { text: '&nbsp;&nbsp;&nbsp;➜ 양변에 <span class="highlight">3을 곱하면</span>: (x ÷ 3) <span class="highlight-green">× 3</span> = 2 <span class="highlight-green">× 3</span>', delay: 2800 },
      { text: '&nbsp;&nbsp;&nbsp;➜ <span class="highlight-yellow">x = 6</span>', delay: 3500 },
    ],
    generate() {
      const type = Math.random() < 0.5 ? 'mul' : 'div';
      let question, step1Label, step1Answer, step2Answer;
      if (type === 'mul') {
        // ax = b → step1Answer=a(2~5), step2Answer=x(-10~10, ≠0)
        const a = randInt(2, 5);
        let x;
        do { x = randInt(-10, 10); } while (x === 0);
        const b = a * x;
        question = `${a}x = ${b}`;
        step1Label = `양변을 나눌 수는?`;
        step1Answer = a;
        step2Answer = x;
      } else {
        // x ÷ a = b → step1Answer=a(2~5), step2Answer=x(-10~10, ≠0)
        const a = randInt(2, 5);
        const maxB = Math.floor(10 / a);
        if (maxB < 1) return this.generate();
        let b;
        do { b = randInt(-maxB, maxB); } while (b === 0);
        const x = a * b;
        question = `x ÷ ${a} = ${b}`;
        step1Label = `양변에 곱할 수는?`;
        step1Answer = a;
        step2Answer = x;
      }
      // 최종 검증
      if (step1Answer < -10 || step1Answer > 10) return this.generate();
      if (step2Answer < -10 || step2Answer > 10) return this.generate();
      return { question, step1Label, step1Answer, step2Answer };
    }
  },

  // Stage 4: ax + b = c (이항)
  {
    id: 4,
    title: 'ax + b = c 형태 (이항)',
    type: 'twostep',
    concept: [
      { text: '이항이란? <span class="highlight">등호의 한 쪽 항을 반대편으로 부호를 바꿔 옮기는 것</span>', delay: 0 },
      { text: '예) <span class="highlight-blue">2x + 3 = 7</span>', delay: 700 },
      { text: '&nbsp;&nbsp;&nbsp;➜ 3을 이항: <span class="highlight-green">2x = 7 - 3</span> &nbsp;➜&nbsp; 2x = 4', delay: 1400 },
      { text: '&nbsp;&nbsp;&nbsp;➜ 양변 ÷ 2: <span class="highlight-yellow">x = 2</span>', delay: 2100 },
    ],
    generate() {
      // ax + b = c
      // step1Answer = ax (-10~10), step2Answer = x (-10~10, ≠0)
      const a = randInt(2, 4);
      const maxX = Math.floor(10 / a);
      let x;
      do { x = randInt(-maxX, maxX); } while (x === 0);
      const ax = a * x; // step1Answer
      let b;
      do { b = randInt(-9, 9); } while (b === 0);
      const c = ax + b;
      const bStr = b >= 0 ? `+ ${b}` : `- ${Math.abs(b)}`;
      const question = `${a}x ${bStr} = ${c}`;
      const step1Answer = ax;
      const step1Label = `이항 후 우변의 값은? (${a}x = ?)`;
      // 최종 검증
      if (step1Answer < -10 || step1Answer > 10) return this.generate();
      if (x < -10 || x > 10) return this.generate();
      return { question, step1Label, step1Answer, step2Answer: x };
    }
  },

  // Stage 5: ax + b = cx + d
  {
    id: 5,
    title: 'ax + b = cx + d 형태',
    type: 'twostep',
    concept: [
      { text: '예) <span class="highlight-blue">3x + 1 = x + 7</span>', delay: 0 },
      { text: '&nbsp;&nbsp;&nbsp;➜ x 항을 왼쪽으로, 숫자를 오른쪽으로 이항', delay: 700 },
      { text: '&nbsp;&nbsp;&nbsp;➜ <span class="highlight-green">3x - x = 7 - 1</span> &nbsp;➜&nbsp; 2x = 6', delay: 1400 },
      { text: '&nbsp;&nbsp;&nbsp;➜ 양변 ÷ 2: <span class="highlight-yellow">x = 3</span>', delay: 2100 },
    ],
    generate() {
      // (a-c)x = rhs → step1Answer=rhs(-10~10), step2Answer=x(-10~10, ≠0)
      const coeff = randInt(1, 4); // a-c, 항상 양수
      const maxX = Math.floor(10 / coeff);
      if (maxX < 1) return this.generate();
      let x;
      do { x = randInt(-maxX, maxX); } while (x === 0);
      const rhs = coeff * x; // step1Answer: -10~10 보장
      const c = randInt(1, 3);
      const a = c + coeff;
      let b;
      do { b = randInt(-8, 8); } while (b === 0);
      const d = rhs + b;
      const bStr = b >= 0 ? `+ ${b}` : `- ${Math.abs(b)}`;
      const dStr = d >= 0 ? `+ ${d}` : `- ${Math.abs(d)}`;
      const question = `${a}x ${bStr} = ${c}x ${dStr}`;
      const step1Label = `이항 후: ${coeff}x = ? 우변은?`;
      // 최종 검증
      if (rhs < -10 || rhs > 10) return this.generate();
      if (x < -10 || x > 10) return this.generate();
      return { question, step1Label, step1Answer: rhs, step2Answer: x };
    }
  },

  // Stage 6: ax + b = cx + d 암산 (해 바로 구하기, -10~10)
  {
    id: 6,
    title: 'ax + b = cx + d 암산',
    type: 'onestep',
    btnRange: 10,
    concept: [
      { text: '이제 <span class="highlight">암산</span>으로 해를 바로 구해봐요!', delay: 0 },
      { text: '예) <span class="highlight-blue">5x + 7 = 2x + 4</span>', delay: 700 },
      { text: '&nbsp;&nbsp;&nbsp;➜ 3x = -3 &nbsp;➜&nbsp; <span class="highlight-yellow">x = -1</span>', delay: 1400 },
      { text: '과정은 머릿속으로! <span class="highlight-green">해만 바로 선택</span>하세요.', delay: 2100 },
    ],
    generate() {
      const coeff = randInt(1, 4);
      const maxX = Math.floor(10 / coeff);
      if (maxX < 1) return this.generate();
      let x;
      do { x = randInt(-maxX, maxX); } while (x === 0);
      const c = randInt(1, 3);
      const a = c + coeff;
      let b;
      do { b = randInt(-8, 8); } while (b === 0);
      const d = coeff * x + b;
      const bStr = b >= 0 ? `+ ${b}` : `- ${Math.abs(b)}`;
      const dStr = d >= 0 ? `+ ${d}` : `- ${Math.abs(d)}`;
      const question = `${a}x ${bStr} = ${c}x ${dStr}`;
      if (x < -10 || x > 10) return this.generate();
      return { question, answer: x };
    }
  },

  // Stage 7: x/a = b (a가 분수 계수, x/3 표기, 해 바로 구하기, -20~20)
  {
    id: 7,
    title: 'x/a = b (분수 계수)',
    type: 'onestep',
    btnRange: 20,
    concept: [
      { text: '예) <span class="highlight-blue">x/3 = 4</span>', delay: 0 },
      { text: '&nbsp;&nbsp;&nbsp;➜ 양변에 3을 곱하면: <span class="highlight-yellow">x = 12</span>', delay: 700 },
      { text: '예) <span class="highlight-blue">2x/3 = 4</span>', delay: 1400 },
      { text: '&nbsp;&nbsp;&nbsp;➜ 양변에 3/2을 곱하면: <span class="highlight-yellow">x = 6</span>', delay: 2100 },
      { text: '<span class="highlight-green">해를 바로 선택</span>하세요!', delay: 2800 },
    ],
    generate() {
      // x/a = b 또는 px/q = b 형태
      // x를 먼저 정하고 역산
      // 분수 계수 후보: 1/2, 1/3, 1/4, 2/3, 3/4, -1/2, -1/3, -2/3, -3/4
      const fracs = [
        {p:1,q:2},{p:1,q:3},{p:1,q:4},{p:2,q:3},{p:3,q:4},
        {p:-1,q:2},{p:-1,q:3},{p:-2,q:3},{p:-3,q:4}
      ];
      const frac = fracs[Math.floor(Math.random() * fracs.length)];
      const {p, q} = frac;
      // x는 q의 배수여야 b가 정수
      const maxX = Math.floor(20 / Math.abs(q));
      const multiples = [];
      for (let m = -maxX; m <= maxX; m++) {
        const xv = m * q;
        if (xv !== 0 && Math.abs(xv) <= 20 && Number.isInteger(p * xv / q)) multiples.push(xv);
      }
      if (multiples.length === 0) return this.generate();
      const x = multiples[Math.floor(Math.random() * multiples.length)];
      const b = p * x / q; // 정수 보장
      if (!Number.isInteger(b)) return this.generate();
      // 문제 표기: x/q = b (p=1), px/q = b (p>1)
      let question;
      const absP = Math.abs(p);
      const sign = p < 0 ? '-' : '';
      if (absP === 1) question = `${sign}x/${q} = ${b}`;
      else question = `${sign}${absP}x/${q} = ${b}`;
      if (x < -20 || x > 20) return this.generate();
      return { question, answer: x };
    }
  },

  // Stage 8: px/q + b = c (분수 계수, 해 바로 구하기, -20~20)
  {
    id: 8,
    title: 'x/a + b = c (분수 계수)',
    type: 'onestep',
    btnRange: 20,
    concept: [
      { text: '예) <span class="highlight-blue">x/3 + 2 = 6</span>', delay: 0 },
      { text: '&nbsp;&nbsp;&nbsp;➜ x/3 = 4 &nbsp;➜&nbsp; <span class="highlight-yellow">x = 12</span>', delay: 700 },
      { text: '예) <span class="highlight-blue">2x/3 - 1 = 3</span>', delay: 1400 },
      { text: '&nbsp;&nbsp;&nbsp;➜ 2x/3 = 4 &nbsp;➜&nbsp; <span class="highlight-yellow">x = 6</span>', delay: 2100 },
      { text: '<span class="highlight-green">해를 바로 선택</span>하세요!', delay: 2800 },
    ],
    generate() {
      const fracs = [
        {p:1,q:2},{p:1,q:3},{p:1,q:4},{p:2,q:3},{p:3,q:4},
        {p:-1,q:2},{p:-1,q:3},{p:-2,q:3},{p:-3,q:4}
      ];
      const frac = fracs[Math.floor(Math.random() * fracs.length)];
      const {p, q} = frac;
      const maxX = Math.floor(20 / Math.abs(q));
      const multiples = [];
      for (let m = -maxX; m <= maxX; m++) {
        const xv = m * q;
        if (xv !== 0 && Math.abs(xv) <= 20 && Number.isInteger(p * xv / q)) multiples.push(xv);
      }
      if (multiples.length === 0) return this.generate();
      const x = multiples[Math.floor(Math.random() * multiples.length)];
      const ax = p * x / q;
      if (!Number.isInteger(ax)) return this.generate();
      let b;
      do { b = randInt(-8, 8); } while (b === 0);
      const c = ax + b;
      const absP = Math.abs(p);
      const sign = p < 0 ? '-' : '';
      let lhs;
      if (absP === 1) lhs = `${sign}x/${q}`;
      else lhs = `${sign}${absP}x/${q}`;
      const bStr = b >= 0 ? `+ ${b}` : `- ${Math.abs(b)}`;
      const question = `${lhs} ${bStr} = ${c}`;
      if (x < -20 || x > 20) return this.generate();
      return { question, answer: x };
    }
  },

  // Stage 9: px/q + b = rx/s + d (분수 계수, 해 바로 구하기, -20~20)
  {
    id: 9,
    title: 'x/a + b = x/c + d (분수 계수)',
    type: 'onestep',
    btnRange: 20,
    concept: [
      { text: '예) <span class="highlight-blue">x/2 + 1 = x/3 + 4</span>', delay: 0 },
      { text: '&nbsp;&nbsp;&nbsp;➜ x/2 - x/3 = 3 &nbsp;➜&nbsp; x/6 = 3', delay: 700 },
      { text: '&nbsp;&nbsp;&nbsp;➜ <span class="highlight-yellow">x = 18</span>', delay: 1400 },
      { text: '<span class="highlight-green">해를 바로 선택</span>하세요!', delay: 2100 },
    ],
    generate() {
      // x/q1 + b = x/q2 + d 형태 (분자=1)
      // (1/q1 - 1/q2)x = d - b
      const qPairs = [[2,3],[2,4],[3,4],[3,6],[4,6],[2,6]];
      const [q1, q2] = qPairs[Math.floor(Math.random() * qPairs.length)];
      // coeff = 1/q1 - 1/q2 = (q2-q1)/(q1*q2)
      const coeffNum = q2 - q1; // 분자
      const coeffDen = q1 * q2; // 분모
      // x = (d-b) * coeffDen / coeffNum 이 정수이고 -20~20이어야 함
      // x = k * coeffDen / coeffNum → coeffNum | k*coeffDen
      // 간단하게: x = n * (coeffDen / gcd(coeffNum, coeffDen))
      const g = gcd(Math.abs(coeffNum), coeffDen);
      const step = coeffDen / g; // x의 최소 단위
      const maxN = Math.floor(20 / step);
      if (maxN < 1) return this.generate();
      let x;
      const candidates = [];
      for (let n = -maxN; n <= maxN; n++) {
        if (n !== 0) candidates.push(n * step);
      }
      if (candidates.length === 0) return this.generate();
      x = candidates[Math.floor(Math.random() * candidates.length)];
      if (Math.abs(x) > 20) return this.generate();
      // b, d 계산: x/q1 + b = x/q2 + d
      // d - b = (1/q1 - 1/q2)*x = coeffNum*x/coeffDen
      const diff = coeffNum * x / coeffDen; // d-b, 정수 보장
      if (!Number.isInteger(diff)) return this.generate();
      let b;
      do { b = randInt(-6, 6); } while (b === 0);
      const d = diff + b;
      const bStr = b >= 0 ? `+ ${b}` : `- ${Math.abs(b)}`;
      const dStr = d >= 0 ? `+ ${d}` : `- ${Math.abs(d)}`;
      const question = `x/${q1} ${bStr} = x/${q2} ${dStr}`;
      return { question, answer: x };
    }
  }
];

// ══════════════════════════════════════════
// 유틸
// ══════════════════════════════════════════
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}
function randIntNonZero(min, max) {
  let v;
  do { v = randInt(min, max); } while (v === 0);
  return v;
}
function gcd(a, b) {
  return b === 0 ? a : gcd(b, a % b);
}

// ══════════════════════════════════════════
// 게임 상태
// ══════════════════════════════════════════
let stageIdx = 0;
let streak = 0;
let currentProblem = null;
let twoStepPhase = 1; // 1 or 2

// ══════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════
function init() {
  loadStage();
}

function buildIntButtons(range) {
  const container = document.getElementById('int-buttons');
  container.innerHTML = '';
  // 범위에 따라 열 수 조정
  container.style.gridTemplateColumns = range <= 10 ? 'repeat(7, 1fr)' : 'repeat(9, 1fr)';
  for (let i = -range; i <= range; i++) {
    const btn = document.createElement('button');
    btn.className = 'int-btn';
    btn.textContent = i;
    btn.dataset.val = i;
    btn.onclick = () => onIntClick(i, btn);
    container.appendChild(btn);
  }
}

// ══════════════════════════════════════════
// 스테이지 로드
// ══════════════════════════════════════════
function loadStage() {
  const stage = STAGES[stageIdx];
  document.getElementById('stage-indicator').textContent = `Stage ${stage.id} / ${STAGES.length}`;
  streak = 0;
  updateStreakBar();
  // 버튼 범위: onestep/twostep은 stage.btnRange, 없으면 10
  const range = stage.btnRange || 10;
  buildIntButtons(range);
  showConcept(stage);
  nextProblem();
}

function showConcept(stage) {
  const title = document.getElementById('concept-title');
  const content = document.getElementById('concept-content');
  title.textContent = `📖 Stage ${stage.id}: ${stage.title}`;
  content.innerHTML = '';
  stage.concept.forEach((line, i) => {
    const div = document.createElement('div');
    div.className = 'concept-line';
    div.innerHTML = line.text;
    content.appendChild(div);
    setTimeout(() => div.classList.add('visible'), line.delay + 200);
  });
}

// ══════════════════════════════════════════
// 문제 생성
// ══════════════════════════════════════════
function nextProblem() {
  const stage = STAGES[stageIdx];
  currentProblem = stage.generate();
  twoStepPhase = 1;

  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = '';

  if (stage.type === 'choice') {
    showChoiceProblem();
  } else if (stage.type === 'onestep') {
    showOneStepProblem();
  } else {
    showTwoStepProblem();
  }
}

function showChoiceProblem() {
  document.getElementById('s1-choices').style.display = 'grid';
  document.getElementById('int-buttons').style.display = 'none';
  document.getElementById('two-step-display').style.display = 'none';

  document.getElementById('problem-text').textContent = currentProblem.question;
  document.getElementById('problem-sub').textContent = '';
  document.getElementById('step-hint').textContent = '';

  const container = document.getElementById('s1-choices');
  container.innerHTML = '';
  currentProblem.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = `${i + 1}. ${c.text}`;
    btn.onclick = () => onChoiceClick(c.isCorrect, btn, container);
    container.appendChild(btn);
  });
}

function showOneStepProblem() {
  document.getElementById('s1-choices').style.display = 'none';
  document.getElementById('int-buttons').style.display = 'grid';
  document.getElementById('two-step-display').style.display = 'none';

  document.getElementById('problem-text').textContent = currentProblem.question;
  document.getElementById('problem-sub').textContent = '';
  document.getElementById('step-hint').textContent = 'x = ?';

  resetIntButtons();
}

function showTwoStepProblem() {
  document.getElementById('s1-choices').style.display = 'none';
  document.getElementById('int-buttons').style.display = 'grid';
  document.getElementById('two-step-display').style.display = 'flex';

  document.getElementById('problem-text').textContent = currentProblem.question;
  document.getElementById('problem-sub').textContent = '';

  // step boxes 초기화
  document.getElementById('step1-label').textContent = currentProblem.step1Label;
  document.getElementById('step1-val').textContent = '?';
  document.getElementById('step2-val').textContent = '?';
  document.getElementById('step1-box').className = 'step-box active';
  document.getElementById('step2-box').className = 'step-box';

  document.getElementById('step-hint').textContent = `1단계: ${currentProblem.step1Label}`;

  resetIntButtons();
}

function resetIntButtons() {
  document.querySelectorAll('.int-btn').forEach(b => {
    b.className = 'int-btn';
    b.disabled = false;
  });
}

// ══════════════════════════════════════════
// 클릭 핸들러
// ══════════════════════════════════════════
function onChoiceClick(isCorrect, btn, container) {
  // 모든 버튼 비활성화
  container.querySelectorAll('.choice-btn').forEach(b => b.onclick = null);

  if (isCorrect) {
    btn.classList.add('correct');
    onCorrect();
  } else {
    btn.classList.add('wrong');
    // 정답 표시
    container.querySelectorAll('.choice-btn').forEach((b, i) => {
      if (currentProblem.choices[i].isCorrect) b.classList.add('correct');
    });
    onWrong();
  }
}

function onIntClick(val, btn) {
  const stage = STAGES[stageIdx];

  if (stage.type === 'onestep') {
    if (val === currentProblem.answer) {
      btn.classList.add('correct');
      onCorrect();
    } else {
      btn.classList.add('wrong');
      showFeedbackWrong();
      setTimeout(() => onWrong(), 1000);
    }
    return;
  }

  if (stage.type !== 'twostep') return;

  if (twoStepPhase === 1) {
    if (val === currentProblem.step1Answer) {
      btn.classList.add('correct');
      document.getElementById('step1-val').textContent = val;
      document.getElementById('step1-box').className = 'step-box done';
      document.getElementById('step2-box').className = 'step-box active';
      document.getElementById('step-hint').textContent = `2단계: x = ?`;
      document.getElementById('feedback').textContent = '✓ 맞아요! 이제 x를 구하세요.';
      document.getElementById('feedback').className = 'correct';
      twoStepPhase = 2;
      setTimeout(() => {
        resetIntButtons();
        document.getElementById('feedback').textContent = '';
      }, 800);
    } else {
      btn.classList.add('wrong');
      showFeedbackWrong();
      setTimeout(() => onWrong(), 1000);
    }
  } else {
    if (val === currentProblem.step2Answer) {
      btn.classList.add('correct');
      document.getElementById('step2-val').textContent = val;
      document.getElementById('step2-box').className = 'step-box done';
      onCorrect();
    } else {
      btn.classList.add('wrong');
      showFeedbackWrong();
      setTimeout(() => onWrong(), 1000);
    }
  }
}

// ══════════════════════════════════════════
// 정답 / 오답 처리
// ══════════════════════════════════════════
function onCorrect() {
  streak++;
  updateStreakBar();
  document.getElementById('feedback').textContent = '🎉 정답!';
  document.getElementById('feedback').className = 'correct';

  if (streak >= 5) {
    setTimeout(showClear, 700);
  } else {
    setTimeout(nextProblem, 900);
  }
}

function onWrong() {
  streak = 0;
  updateStreakBar();
  showFail();
}

function showFeedbackWrong() {
  document.getElementById('feedback').textContent = '❌ 틀렸어요!';
  document.getElementById('feedback').className = 'wrong';
}

// ══════════════════════════════════════════
// 스트릭 바
// ══════════════════════════════════════════
function updateStreakBar() {
  for (let i = 0; i < 5; i++) {
    document.getElementById(`d${i}`).classList.toggle('active', i < streak);
  }
}

// ══════════════════════════════════════════
// 오버레이
// ══════════════════════════════════════════
function showClear() {
  document.getElementById('clear-overlay').classList.add('show');
}

function showFail() {
  document.getElementById('fail-overlay').classList.add('show');
}

document.getElementById('btn-next-stage').onclick = () => {
  document.getElementById('clear-overlay').classList.remove('show');
  stageIdx++;
  if (stageIdx >= STAGES.length) {
    document.getElementById('complete-overlay').classList.add('show');
  } else {
    loadStage();
  }
};

document.getElementById('btn-retry-stage').onclick = () => {
  document.getElementById('clear-overlay').classList.remove('show');
  loadStage();
};

document.getElementById('btn-restart').onclick = () => {
  document.getElementById('fail-overlay').classList.remove('show');
  // 스테이지 유지, 스트릭 리셋 후 새 문제
  streak = 0;
  updateStreakBar();
  nextProblem();
};

// ══════════════════════════════════════════
// 시작
// ══════════════════════════════════════════
init();
</script>
